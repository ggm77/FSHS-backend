spring:
  application:
    name: FSHS
  servlet:
    # 업로드 가능한 파일 크기 제한 (단일 50GB, 총합 100GB)
    multipart:
      location: ${fshs.storage.temp-path}
      file-size-threshold: 1MB
      max-file-size: 50GB
      max-request-size: 100GB
  jpa:
    generate-ddl: true
    show-sql: false
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        format_sql: true
    database-platform: com.seohamin.fshs.v2.global.config.FshsSQLiteDialect
    hibernate:
      ddl-auto: none
  datasource:
    url: "jdbc:sqlite:./db/app.sqlite"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 20
      connection-init-sql: "PRAGMA foreign_keys=ON"

server:
  port: 51827
  forward-headers-strategy: framework
  servlet:
    session:
      # 쿠키 설정 (http 환경에서도 세션 사용하기 위함)
      cookie:
        secure: false
        http-only: true
        same-site: lax

# 스웨거 기본 주소를 /api/swagger로 변경 (실제 주소: /api/swagger-ui/index.html)
springdoc:
  swagger-ui:
    path: /api/swagger
  api-docs:
    path: /api/swagger-ui/v3/api-docs

fshs:
  base-path: /mnt/nas1/hosting/fshs2
  storage:
    data-dir-name: data
    temp-dir-name: temp
    thumbnail-dir-name: thumbnail
    data-path: ${fshs.base-path}/${fshs.storage.data-dir-name}
    temp-path: ${fshs.base-path}/${fshs.storage.temp-dir-name}
    thumbnail-path: ${fshs.base-path}/${fshs.storage.thumbnail-dir-name}

app:
  csrf.enabled: true

ffmpeg:
  # 동시 트랜스코딩 최대 수 (초과 시 503 반환)
  max-concurrent: 4
  ffmpeg: /usr/bin/ffmpeg
  ffprobe: /usr/bin/ffprobe