# TEST

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create

file:
  upload:
    # 한번에 업로드 가능한 최대 파일 개수
    max-count: 100

fshs:
  storage:
    data-dir-name: data
    data-path: build/test-storage/data
    temp-path: build/test-storage/temp
    thumbnail-path: build/test-storage/thumbnails

ffmpeg:
  ffmpeg: ffmpeg
  ffprobe: ffprobe
  default-hw-accelerator: none
  default-h264-encoder: libx264
