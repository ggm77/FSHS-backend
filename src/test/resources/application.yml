# TEST

spring:
  datasource:
    url: "jdbc:sqlite::memory:"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA foreign_keys=ON"
  jpa:
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        format_sql: true
    database-platform: com.seohamin.fshs.v2.global.config.FshsSQLiteDialect
    hibernate:
      ddl-auto: create-drop

file:
  upload:
    # 한번에 업로드 가능한 최대 파일 개수
    max-count: 100

fshs:
  storage:
    data-dir-name: data
    data-path: build/test-storage/data
    temp-path: build/test-storage/temp
    thumbnail-path: build/test-storage/thumbnails

ffmpeg:
  ffmpeg: ffmpeg
  ffprobe: ffprobe
  default-hw-accelerator: none
  default-h264-encoder: libx264
